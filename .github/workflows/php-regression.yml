name: PHP Regression

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  regression:
    name: Regression tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
      - name: Run regression tests
        run: php tests/run.php
